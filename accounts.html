<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accounts – TGC CRM</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <style>
    .work-orders-container details{
      margin:10px 0;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    .work-orders-container summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      font-weight:700;
    }

    .work-orders-container summary::-webkit-details-marker{ display:none; }
    .work-orders-container table{ width:100%; min-width:900px; border-collapse:collapse; margin-top:10px; }
    .work-orders-container th,
    .work-orders-container td{ padding:8px; border-bottom:1px solid var(--border); }

    .num{
      text-align:right;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
    }

    .account-name{
      font-weight:800;
      color:var(--main);
    }

    .account-sub{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .table-note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    .loading-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      color:var(--muted);
      font-size:13px;
    }

    #accountModal{
      position:fixed;
      inset:0;
      z-index:1000;
      overflow-y:auto;
      background:rgba(10,24,38,.44);
      backdrop-filter:blur(4px);
      padding:24px 16px;
    }

    #accountModal .wrapper{
      width:min(900px, 100%);
      margin:0 auto;
    }

    #accountModal .card{
      margin-top:0;
      border-radius:16px;
      box-shadow:var(--shadow-lg, var(--shadow));
    }

    #accountModal.hidden{ display:none !important; }

    @media (max-width:900px){
      .grid.grid-3,
      .grid.grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div id="crm-page" data-theme="light">
    <div class="wrapper">
      <div class="row">
        <div>
          <h1>Accounts</h1>
          <p class="muted-text">Optimized loading: fast account list, cached linked work orders, and no repeated full-table fetch per account.</p>
        </div>
        <div class="spacer"></div>
        <a href="index.html" class="btn">🏠 Home</a>
        <button id="themeToggle" type="button">Light / Dark</button>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="newAccountBtn" type="button">+ New Account</button>
      </div>

      <div class="grid grid-3">
        <div class="card">
          <label>Total Accounts</label>
          <h2 id="statTotal">0</h2>
        </div>
        <div class="card">
          <label>Active Accounts</label>
          <h2 id="statActive">0</h2>
        </div>
        <div class="card">
          <label>New This Month</label>
          <h2 id="statNewMonth">0</h2>
        </div>
      </div>

      <div class="card">
        <div class="grid grid-3">
          <div>
            <label for="searchInput">Search</label>
            <input id="searchInput" type="text" placeholder="Search by account name, owner, industry, branch..." />
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter">
              <option value="all">All statuses</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="draft">Draft</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>

          <div>
            <label for="sortBy">Sort By</label>
            <select id="sortBy">
              <option value="name-asc">Name A → Z</option>
              <option value="name-desc">Name Z → A</option>
              <option value="created-desc">Newest created</option>
              <option value="created-asc">Oldest created</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="clearFiltersBtn" type="button">Clear Filters</button>
          <button id="exportBtn" type="button">Export CSV</button>
        </div>
      </div>

      <div class="card">
        <div id="loadState" class="loading-bar" hidden></div>
        <div class="table-wrap">
          <table id="dataTable"></table>
        </div>
        <div id="tableNote" class="table-note"></div>
      </div>
    </div>
  </div>

  <div id="accountModal" class="hidden">
    <div class="wrapper">
      <div class="card">
        <div class="row">
          <div>
            <h2 id="modalTitle">New Account</h2>
            <p class="muted-text" id="modalSubtitle">Create a new account record</p>
          </div>
          <div class="spacer"></div>
          <button id="closeModalBtn" type="button">Close</button>
        </div>

        <form id="accountForm">
          <input type="hidden" id="formMode" value="create" />
          <input type="hidden" id="editRowId" value="" />

          <div class="grid grid-2">
            <div>
              <label for="accountName">Account Name</label>
              <input id="accountName" type="text" required />
            </div>

            <div>
              <label for="accountOwner">Account Owner</label>
              <input id="accountOwner" type="text" />
            </div>

            <div>
              <label for="accountIndustry">Industry</label>
              <input id="accountIndustry" type="text" />
            </div>

            <div>
              <label for="accountBranch">Branch</label>
              <input id="accountBranch" type="text" />
            </div>

            <div>
              <label for="paymentTerms">Payment Terms</label>
              <input id="paymentTerms" type="text" />
            </div>

            <div>
              <label for="paymentMethod">Payment Method</label>
              <input id="paymentMethod" type="text" />
            </div>

            <div>
              <label for="frequency">Frequency</label>
              <input id="frequency" type="text" />
            </div>

            <div>
              <label for="countryId">Country ID</label>
              <input id="countryId" type="text" />
            </div>

            <div>
              <label for="contactId">Contact ID</label>
              <input id="contactId" type="text" />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="Draft">Draft</option>
              </select>
            </div>

            <div class="grid-full col-span-full">
              <label for="billingAddress">Billing Address</label>
              <input id="billingAddress" type="text" />
            </div>

            <div class="grid-full col-span-full">
              <label for="bankingDetails">Banking Details</label>
              <input id="bankingDetails" type="text" />
            </div>
          </div>

          <div class="actions">
            <button id="deleteBtn" type="button" class="remove-btn hidden">Delete</button>
            <button id="cancelBtn" type="button">Cancel</button>
            <button id="saveBtn" type="submit" class="submit-btn">Save Account</button>
          </div>
        </form>

        <div id="accountWorkOrders" class="work-orders-container" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const root = document.getElementById("crm-page");
      const table = document.getElementById("dataTable");
      const loadState = document.getElementById("loadState");
      const tableNote = document.getElementById("tableNote");

      const statTotal = document.getElementById("statTotal");
      const statActive = document.getElementById("statActive");
      const statNewMonth = document.getElementById("statNewMonth");

      const themeToggle = document.getElementById("themeToggle");
      const refreshBtn = document.getElementById("refreshBtn");
      const newAccountBtn = document.getElementById("newAccountBtn");
      const clearFiltersBtn = document.getElementById("clearFiltersBtn");
      const exportBtn = document.getElementById("exportBtn");

      const searchInput = document.getElementById("searchInput");
      const statusFilter = document.getElementById("statusFilter");
      const sortBy = document.getElementById("sortBy");

      const modal = document.getElementById("accountModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalSubtitle = document.getElementById("modalSubtitle");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const accountForm = document.getElementById("accountForm");
      const formMode = document.getElementById("formMode");
      const editRowId = document.getElementById("editRowId");
      const linkedOrders = document.getElementById("accountWorkOrders");

      const POSTGRES_ROOT = window.APP_CONFIG.POSTGRES_API_BASE || window.APP_CONFIG.API_BASE;
      const API_ROOT = window.APP_CONFIG.API_BASE || POSTGRES_ROOT;
      const REQUEST_TIMEOUT_MS = 8000;
      const PAGE_SIZE = 500;

      const ACCOUNT_READ_ENDPOINTS = [
        `${API_ROOT}/api_accounts`,
        `${POSTGRES_ROOT}/accounts?limit=${PAGE_SIZE}`,
        `${API_ROOT}/accounts?limit=${PAGE_SIZE}`
      ];

      const API_BASE = `${POSTGRES_ROOT}/accounts`;
      const WORK_ORDERS_URL = `${POSTGRES_ROOT}/work_orders?limit=5000`;
      const WORK_ITEMS_URL = `${POSTGRES_ROOT}/work_items?limit=10000`;

      let rawRows = [];
      let filteredRows = [];
      let workOrderCache = null;
      let workItemCache = null;
      let workOrdersByAccount = new Map();
      let workItemsByOrder = new Map();

      const FIELD_MAP = {
        id:["AccountId","account_id","accountId","Id","ID","id"],
        name:["AccountName","account_name","accountName","Name","name"],
        owner:["AccountOwner","account_owner","accountOwner","Owner","owner"],
        industry:["AccountIndustry","account_industry","accountIndustry","Industry","industry"],
        branch:["AccountBranch","account_branch","accountBranch","Branch","branch"],
        statusText:["AccountStatus","account_status","accountStatus","Status","status"],
        statusId:["AccountStatusId","account_status_id","accountStatusId","StatusId","status_id"],
        accountTypeId:["AccountTypeId","account_type_id","accountTypeId","TypeId"],
        contactId:["ContactId","contact_id","contactId"],
        countryId:["CountryId","country_id","countryId"],
        billingAddress:["BillingAddress","billing_address","billingAddress"],
        bankingDetails:["BankingDetails","banking_details","bankingDetails"],
        frequency:["Frequency","frequency"],
        firstShipmentDate:["FirstShipmentDate","first_shipment_date","firstShipmentDate"],
        lastShipmentDate:["LastShipmentDate","last_shipment_date","lastShipmentDate"],
        overdueFees:["OverdueFees","overdue_fees","overdueFees"],
        paymentMethod:["PaymentMethod","payment_method","paymentMethod"],
        paymentTerms:["PaymentTerms","payment_terms","paymentTerms"],
        sumOfANF:["SumOfANF","sum_of_anf","sumOfANF"],
        invoiceId:["InvoiceId","invoice_id","invoiceId"],
        workOrderId:["WorkOrderId","work_order_id","workOrderId"],
        entityRefNo:["EntityRefNo","entity_ref_no","entityRefNo"],
        created:["CreateDateTime","created_at","CreatedDate","CreatedOn","created"],
        updated:["ModifiedDateTime","updated_at","UpdateDateTime","ModifiedDate","UpdatedOn","updated"],
        deleted:["DeletedDateTime","deleted_at","deleted"]
      };

      themeToggle.addEventListener("click", () => {
        root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
      });

      refreshBtn.addEventListener("click", () => loadData(true));
      newAccountBtn.addEventListener("click", () => openModal("create"));
      clearFiltersBtn.addEventListener("click", clearFilters);
      exportBtn.addEventListener("click", exportCsv);

      searchInput.addEventListener("input", applyFiltersAndRender);
      statusFilter.addEventListener("change", applyFiltersAndRender);
      sortBy.addEventListener("change", applyFiltersAndRender);

      closeModalBtn.addEventListener("click", closeModal);
      cancelBtn.addEventListener("click", closeModal);
      deleteBtn.addEventListener("click", handleDelete);
      accountForm.addEventListener("submit", handleSave);

      modal.addEventListener("click", e => {
        if (e.target === modal) closeModal();
      });

      async function loadData(forceRefresh = false){
        setLoading("Loading accounts...");
        table.innerHTML = "<thead><tr><th>Loading accounts...</th></tr></thead>";
        tableNote.textContent = "";

        try {
          if (forceRefresh) resetLinkedWorkCache();
          const result = await fetchFirstAvailable(ACCOUNT_READ_ENDPOINTS);
          rawRows = rowsFromResult(result).map(normalizeRow);
          applyFiltersAndRender();
        } catch (err) {
          table.innerHTML = `<thead><tr><th>Error: ${escapeHtml(err.message)}</th></tr></thead>`;
          console.error(err);
        } finally {
          clearLoading();
        }
      }

      async function fetchFirstAvailable(urls){
        const requests = urls.filter(Boolean).map(url => fetchJson(url));
        if (!requests.length) throw new Error("No account endpoints configured");
        return Promise.any(requests);
      }

      async function fetchJson(url){
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

        try {
          const res = await fetch(url, {
            signal:controller.signal,
            headers:{ "Accept":"application/json" }
          });
          const text = await res.text();
          let result;
          try { result = text ? JSON.parse(text) : {}; }
          catch (_) { throw new Error(`${url}: endpoint returned non-JSON response`); }
          if (!res.ok || result.ok === false) throw new Error(`${url}: ${result.error || res.status + " " + res.statusText}`);
          return result;
        } catch (err) {
          if (err.name === "AbortError") throw new Error(`${url}: request timed out after ${REQUEST_TIMEOUT_MS / 1000}s`);
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      function rowsFromResult(result){
        if (Array.isArray(result)) return result;
        if (Array.isArray(result?.rows)) return result.rows;
        if (Array.isArray(result?.data)) return result.data;
        return [];
      }

      function normalizeRow(row){
        const statusText = getFirst(row, FIELD_MAP.statusText);
        const statusId = getFirst(row, FIELD_MAP.statusId);
        return {
          raw:row,
          id:getFirst(row, FIELD_MAP.id),
          name:getFirst(row, FIELD_MAP.name),
          owner:getFirst(row, FIELD_MAP.owner),
          industry:getFirst(row, FIELD_MAP.industry),
          branch:getFirst(row, FIELD_MAP.branch),
          statusText,
          statusId,
          status:normalizeStatus(statusText || statusId),
          accountTypeId:getFirst(row, FIELD_MAP.accountTypeId),
          contactId:getFirst(row, FIELD_MAP.contactId),
          countryId:getFirst(row, FIELD_MAP.countryId),
          billingAddress:getFirst(row, FIELD_MAP.billingAddress),
          bankingDetails:getFirst(row, FIELD_MAP.bankingDetails),
          frequency:getFirst(row, FIELD_MAP.frequency),
          firstShipmentDate:getFirst(row, FIELD_MAP.firstShipmentDate),
          lastShipmentDate:getFirst(row, FIELD_MAP.lastShipmentDate),
          overdueFees:getFirst(row, FIELD_MAP.overdueFees),
          paymentMethod:getFirst(row, FIELD_MAP.paymentMethod),
          paymentTerms:getFirst(row, FIELD_MAP.paymentTerms),
          sumOfANF:getFirst(row, FIELD_MAP.sumOfANF),
          invoiceId:getFirst(row, FIELD_MAP.invoiceId),
          workOrderId:getFirst(row, FIELD_MAP.workOrderId),
          entityRefNo:getFirst(row, FIELD_MAP.entityRefNo),
          created:getFirst(row, FIELD_MAP.created),
          updated:getFirst(row, FIELD_MAP.updated),
          deleted:getFirst(row, FIELD_MAP.deleted)
        };
      }

      function getFirst(obj, keys){
        for (const key of keys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }
        return "";
      }

      function normalizeStatus(value){
        const str = String(value || "").trim().toLowerCase();
        if (!str) return "Unknown";
        if (["1","active","enabled","open","true","yes"].includes(str)) return "Active";
        if (["0","inactive","disabled","closed","false","no"].includes(str)) return "Inactive";
        if (["draft","2","pending"].includes(str)) return "Draft";
        return toTitleCase(str);
      }

      function applyFiltersAndRender(){
        const search = searchInput.value.trim().toLowerCase();
        const status = statusFilter.value;
        const sort = sortBy.value;

        filteredRows = rawRows.filter(row => {
          const haystack = [
            row.id,
            row.name,
            row.owner,
            row.industry,
            row.branch,
            row.status,
            row.statusText,
            row.accountTypeId,
            row.contactId,
            row.countryId,
            row.billingAddress,
            row.bankingDetails,
            row.frequency,
            row.paymentMethod,
            row.paymentTerms,
            row.invoiceId,
            row.workOrderId,
            row.entityRefNo
          ].join(" ").toLowerCase();

          const matchesSearch = !search || haystack.includes(search);
          const matchesStatus = status === "all"
            ? true
            : status === "unknown"
            ? !row.status || row.status === "Unknown"
            : row.status.toLowerCase() === status;

          return matchesSearch && matchesStatus;
        });

        filteredRows.sort((a, b) => {
          switch (sort) {
            case "name-desc": return compareText(b.name, a.name);
            case "created-desc": return compareDate(b.created, a.created);
            case "created-asc": return compareDate(a.created, b.created);
            case "name-asc":
            default: return compareText(a.name, b.name);
          }
        });

        renderStats(filteredRows);
        renderTable(filteredRows);
        tableNote.textContent = `${filteredRows.length} account${filteredRows.length === 1 ? "" : "s"} shown.`;
      }

      function renderStats(rows){
        statTotal.textContent = rows.length;
        statActive.textContent = rows.filter(r => r.status === "Active").length;

        const now = new Date();
        statNewMonth.textContent = rows.filter(r => {
          const d = new Date(r.created);
          return !isNaN(d.getTime()) && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
      }

      function renderTable(rows){
        if (!rows.length) {
          table.innerHTML = `
            <thead><tr><th>Account</th><th>Owner</th><th>Industry</th><th>Branch</th><th>Status</th><th>Payment Terms</th><th>Created</th><th>Updated</th><th>Actions</th></tr></thead>
            <tbody><tr><td colspan="9"><div class="empty-state">No accounts match the current filters.</div></td></tr></tbody>`;
          return;
        }

        table.innerHTML = `
          <thead>
            <tr>
              <th>Account</th>
              <th>Owner</th>
              <th>Industry</th>
              <th>Branch</th>
              <th>Status</th>
              <th>Payment Terms</th>
              <th>Created</th>
              <th>Updated</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>
                  <div class="account-name">${escapeHtml(row.name || "Unnamed Account")}</div>
                  <span class="account-sub">ID: ${escapeHtml(row.id || "-")}</span>
                </td>
                <td>${escapeHtml(row.owner || "-")}</td>
                <td>${escapeHtml(row.industry || "-")}</td>
                <td>${escapeHtml(row.branch || "-")}</td>
                <td>${renderStatusBadge(row.status)}</td>
                <td>${escapeHtml(row.paymentTerms || "-")}</td>
                <td>${formatDate(row.created)}</td>
                <td>${formatDate(row.updated)}</td>
                <td>
                  <div class="row-actions">
                    <button type="button" data-action="edit" data-id="${escapeHtml(String(row.id))}">Edit</button>
                    <button type="button" data-action="view" data-id="${escapeHtml(String(row.id))}">View</button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>`;

        table.querySelectorAll("[data-action='edit']").forEach(btn => {
          btn.addEventListener("click", () => {
            const row = rows.find(r => String(r.id) === btn.dataset.id);
            if (row) openModal("edit", row);
          });
        });

        table.querySelectorAll("[data-action='view']").forEach(btn => {
          btn.addEventListener("click", () => {
            const row = rows.find(r => String(r.id) === btn.dataset.id);
            if (row) openModal("view", row);
          });
        });
      }

      function openModal(mode, row = null){
        formMode.value = mode;
        editRowId.value = row?.id || "";

        const isView = mode === "view";
        const isEdit = mode === "edit";

        modalTitle.textContent = mode === "create" ? "New Account" : mode === "edit" ? "Edit Account" : "View Account";
        modalSubtitle.textContent = mode === "create" ? "Create a new account record" : mode === "edit" ? "Update account details" : "View account information";

        document.getElementById("accountName").value = row?.name || "";
        document.getElementById("accountOwner").value = row?.owner || "";
        document.getElementById("accountIndustry").value = row?.industry || "";
        document.getElementById("accountBranch").value = row?.branch || "";
        document.getElementById("paymentTerms").value = row?.paymentTerms || "";
        document.getElementById("paymentMethod").value = row?.paymentMethod || "";
        document.getElementById("frequency").value = row?.frequency || "";
        document.getElementById("countryId").value = row?.countryId || "";
        document.getElementById("contactId").value = row?.contactId || "";
        document.getElementById("billingAddress").value = row?.billingAddress || "";
        document.getElementById("bankingDetails").value = row?.bankingDetails || "";
        document.getElementById("status").value = row?.status && ["Active","Inactive","Draft"].includes(row.status) ? row.status : "Active";

        Array.from(accountForm.querySelectorAll("input, select")).forEach(el => {
          if (el.type !== "hidden") el.disabled = isView;
        });

        deleteBtn.classList.toggle("hidden", !isEdit);
        document.getElementById("saveBtn").classList.toggle("hidden", isView);

        loadAccountWorkOrders(mode === "create" ? null : row?.id);
        modal.classList.remove("hidden");
      }

      function closeModal(){
        modal.classList.add("hidden");
        accountForm.reset();
        formMode.value = "create";
        editRowId.value = "";
        deleteBtn.classList.add("hidden");
        document.getElementById("saveBtn").classList.remove("hidden");
        linkedOrders.innerHTML = "";
      }

      async function handleSave(e){
        e.preventDefault();

        const mode = formMode.value;
        const rowId = editRowId.value;
        const payload = {
          AccountName:document.getElementById("accountName").value.trim(),
          AccountOwner:document.getElementById("accountOwner").value.trim(),
          AccountIndustry:document.getElementById("accountIndustry").value.trim(),
          AccountBranch:document.getElementById("accountBranch").value.trim(),
          PaymentTerms:document.getElementById("paymentTerms").value.trim(),
          PaymentMethod:document.getElementById("paymentMethod").value.trim(),
          Frequency:document.getElementById("frequency").value.trim(),
          CountryId:document.getElementById("countryId").value.trim(),
          ContactId:document.getElementById("contactId").value.trim(),
          BillingAddress:document.getElementById("billingAddress").value.trim(),
          BankingDetails:document.getElementById("bankingDetails").value.trim(),
          AccountStatus:document.getElementById("status").value
        };

        try {
          const url = mode === "edit" ? `${API_BASE}/${encodeURIComponent(rowId)}` : API_BASE;
          const method = mode === "edit" ? "PUT" : "POST";
          const res = await fetch(url, {
            method,
            headers:{ "Content-Type":"application/json", "Accept":"application/json" },
            body:JSON.stringify(payload)
          });
          const result = await res.json().catch(() => ({}));
          if (!res.ok || result.ok === false) throw new Error(result.error || `Failed to ${mode === "edit" ? "update" : "create"} account`);
          closeModal();
          resetLinkedWorkCache();
          await loadData(true);
          alert(mode === "edit" ? "Account updated successfully." : "Account created successfully.");
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      }

      async function handleDelete(){
        const rowId = editRowId.value;
        if (!rowId) return;
        if (!confirm("Delete this account?")) return;

        try {
          const res = await fetch(`${API_BASE}/${encodeURIComponent(rowId)}`, { method:"DELETE", headers:{ "Accept":"application/json" } });
          const result = await res.json().catch(() => ({}));
          if (!res.ok || result.ok === false) throw new Error(result.error || "Failed to delete account");
          closeModal();
          resetLinkedWorkCache();
          await loadData(true);
          alert("Account deleted successfully.");
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      }

      async function loadAccountWorkOrders(recordId){
        if (!recordId) {
          linkedOrders.innerHTML = "";
          return;
        }

        linkedOrders.innerHTML = '<p class="muted-text">Loading linked work orders...</p>';

        try {
          await ensureLinkedWorkCache();
          const orders = workOrdersByAccount.get(String(recordId)) || [];

          if (!orders.length) {
            linkedOrders.innerHTML = '<h3>Work Orders</h3><p class="muted-text">No linked work orders found.</p>';
            return;
          }

          linkedOrders.innerHTML = renderLinkedWorkOrders(orders);
        } catch (err) {
          console.error(err);
          linkedOrders.innerHTML = `<h3>Work Orders</h3><p>Error: ${escapeHtml(err.message)}</p>`;
        }
      }

      async function ensureLinkedWorkCache(){
        if (workOrderCache && workItemCache) return;

        const [ordersResult, itemsResult] = await Promise.allSettled([
          fetchJson(WORK_ORDERS_URL),
          fetchJson(WORK_ITEMS_URL)
        ]);

        if (ordersResult.status === "rejected") throw ordersResult.reason;

        workOrderCache = rowsFromResult(ordersResult.value);
        workItemCache = itemsResult.status === "fulfilled" ? rowsFromResult(itemsResult.value) : [];
        workItemsByOrder = groupItemsByOrder(workItemCache);
        workOrdersByAccount = groupOrdersByAccount(workOrderCache);
      }

      function resetLinkedWorkCache(){
        workOrderCache = null;
        workItemCache = null;
        workOrdersByAccount = new Map();
        workItemsByOrder = new Map();
      }

      function groupOrdersByAccount(orders){
        const map = new Map();
        orders.forEach(order => {
          const accountId = String(getVal(order, ["AccountId","account_id","accountId"], ""));
          if (!accountId) return;
          if (!map.has(accountId)) map.set(accountId, []);
          map.get(accountId).push(order);
        });
        return map;
      }

      function groupItemsByOrder(items){
        const map = new Map();
        items.forEach(item => {
          const orderId = String(getLinkedItemOrderId(item));
          if (!orderId) return;
          if (!map.has(orderId)) map.set(orderId, []);
          map.get(orderId).push(item);
        });
        return map;
      }

      function renderLinkedWorkOrders(orders){
        let html = '<h3>Work Orders</h3>';
        orders.forEach(order => {
          const orderId = getLinkedOrderId(order) || "-";
          const items = workItemsByOrder.get(String(orderId)) || [];
          const ref = getVal(order, ["EntityRefNo","entity_ref_no","RefNo"], "");
          const created = formatDate(getVal(order, ["CreateDateTime","created_at","CreatedDate","CreatedOn"], ""));
          const total = numberOrFallback(getVal(order, ["Total","total"], ""), items.reduce((sum,item) => sum + calcItem(item).lineTotal, 0));
          const anf = numberOrFallback(getVal(order, ["ANF","anf","GrossProfit","gross_profit"], ""), items.reduce((sum,item) => sum + calcItem(item).gross, 0));

          const itemRows = items.map(item => {
            const c = calcItem(item);
            return `<tr>
              <td>${escapeHtml(getVal(item, ["ServiceCode","service_code","Service"], "-"))}</td>
              <td>${escapeHtml(getVal(item, ["ProductCode","product_code","Product"], "-"))}</td>
              <td>${escapeHtml(getVal(item, ["RegionCode","region_code","Region"], "-"))}</td>
              <td class="num">${formatNumber(c.qty)}</td>
              <td class="num">${formatNumber(c.unit)}</td>
              <td class="num">${formatNumber(c.lineTotal)}</td>
              <td class="num">${formatNumber(c.cost)}</td>
              <td class="num">${formatNumber(c.gross)}</td>
              <td class="num">${c.lineTotal ? formatNumber(c.margin) + "%" : "-"}</td>
            </tr>`;
          }).join("");

          html += `<details>
            <summary>
              <span>Work Order #${escapeHtml(orderId)}${ref ? ` <span class="muted-text">${escapeHtml(ref)}</span>` : ""}<br><span class="muted-text">Created: ${created}</span></span>
              <span class="num">Total: ${formatNumber(total)}<br>ANF: ${formatNumber(anf)}</span>
            </summary>
            <div style="overflow-x:auto;">
              <table>
                <thead><tr><th>Service</th><th>Product</th><th>Region</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Line Total</th><th class="num">Cost</th><th class="num">ANF</th><th class="num">Margin</th></tr></thead>
                <tbody>${itemRows || '<tr><td colspan="9">No work items found.</td></tr>'}</tbody>
              </table>
            </div>
          </details>`;
        });
        return html;
      }

      function calcItem(item){
        const qty = num(getVal(item, ["Quantity","quantity","qty","Qty"], 0));
        const unit = num(getVal(item, ["UnitPrice","unit_price","unitPrice","Price"], 0));
        const storedTotal = getVal(item, ["LineTotal","line_total","lineTotal"], "");
        const lineTotal = storedTotal !== "" ? num(storedTotal) : qty * unit;
        const cost = num(getVal(item, ["EstimatedCost","estimated_cost","Cost","cost"], 0));
        const storedGross = getVal(item, ["GrossProfit","gross_profit","ANF","anf"], "");
        const gross = storedGross !== "" ? num(storedGross) : lineTotal - cost;
        const storedMargin = getVal(item, ["GrossMarginPct","gross_margin_pct"], "");
        const margin = storedMargin !== "" ? num(storedMargin) : (lineTotal ? (gross / lineTotal) * 100 : 0);
        return { qty, unit, lineTotal, cost, gross, margin };
      }

      function getLinkedObjectId(obj, explicitKeys){
        for (const key of explicitKeys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }
        const dynamicKey = Object.keys(obj).find(key => {
          const normal = key.toLowerCase().replace(/[^a-z0-9]/g, "");
          return normal === "workorderid" || normal === "workordersid";
        });
        return dynamicKey ? obj[dynamicKey] : "";
      }

      function getLinkedOrderId(order){ return getLinkedObjectId(order, ["work_order_id","WorkOrderId","WorkOrderID","workOrderId","Id","ID","id"]); }
      function getLinkedItemOrderId(item){ return getLinkedObjectId(item, ["work_order_id","WorkOrderId","WorkOrderID","workOrderId"]); }

      function exportCsv(){
        const headers = ["ID","Account Name","Owner","Industry","Branch","Status","Payment Terms","Payment Method","Country ID","Contact ID","Created","Updated"];
        const lines = [headers.join(",")].concat(filteredRows.map(row => [
          csvValue(row.id),
          csvValue(row.name),
          csvValue(row.owner),
          csvValue(row.industry),
          csvValue(row.branch),
          csvValue(row.status),
          csvValue(row.paymentTerms),
          csvValue(row.paymentMethod),
          csvValue(row.countryId),
          csvValue(row.contactId),
          csvValue(row.created),
          csvValue(row.updated)
        ].join(",")));

        const blob = new Blob([lines.join("\n")], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "accounts.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function clearFilters(){
        searchInput.value = "";
        statusFilter.value = "all";
        sortBy.value = "name-asc";
        applyFiltersAndRender();
      }

      function renderStatusBadge(status){
        const value = String(status || "Unknown");
        const key = value.toLowerCase();
        let cls = "status-info";
        if (["active","open","enabled"].includes(key)) cls = "status-active";
        if (["inactive","closed","disabled"].includes(key)) cls = "status-inactive";
        if (["draft","pending"].includes(key)) cls = "status-draft";
        return `<span class="status-badge ${cls}">${escapeHtml(value)}</span>`;
      }

      function getVal(obj, keys, fallback=""){
        for (const key of keys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }
        return fallback;
      }

      function compareText(a, b){ return String(a || "").localeCompare(String(b || "")); }
      function compareDate(a, b){ return parseDateSafe(a) - parseDateSafe(b); }
      function parseDateSafe(value){ const d = new Date(value); return isNaN(d.getTime()) ? 0 : d.getTime(); }
      function num(value){ const n = Number(value); return Number.isFinite(n) ? n : 0; }
      function numberOrFallback(value, fallback){ return value === "" || value === null || value === undefined ? fallback : num(value); }
      function formatNumber(value){ const n = Number(value); return Number.isFinite(n) ? n.toLocaleString("en-ZA", { minimumFractionDigits:2, maximumFractionDigits:2 }) : "-"; }
      function formatDate(value){ if (!value) return "-"; const d = new Date(value); return isNaN(d.getTime()) ? escapeHtml(String(value)) : escapeHtml(d.toLocaleDateString("en-ZA", { day:"2-digit", month:"short", year:"numeric" })); }
      function csvValue(value){ return `"${String(value ?? "").replaceAll('"', '""')}"`; }
      function toTitleCase(str){ return str.replace(/\b\w/g, c => c.toUpperCase()); }
      function escapeHtml(str){ return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }

      function setLoading(message){
        loadState.hidden = false;
        loadState.innerHTML = `<span>${escapeHtml(message)}</span><span>Timeout: ${REQUEST_TIMEOUT_MS / 1000}s</span>`;
      }

      function clearLoading(){
        loadState.hidden = true;
        loadState.textContent = "";
      }

      loadData();
    })();
  </script>
</body>
</html>
