<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacts – TGC CRM</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <style>
    .work-orders-container details{
      margin:10px 0;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    .work-orders-container summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      font-weight:700;
    }

    .work-orders-container summary::-webkit-details-marker{ display:none; }
    .work-orders-container table{ width:100%; min-width:900px; border-collapse:collapse; margin-top:10px; }
    .work-orders-container th,
    .work-orders-container td{ padding:8px; border-bottom:1px solid var(--border); }

    .num{
      text-align:right;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
    }

    .contact-name{
      font-weight:800;
      color:var(--main);
    }

    .contact-sub{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .table-note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    .loading-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      color:var(--muted);
      font-size:13px;
    }

    #contactModal{
      position:fixed;
      inset:0;
      z-index:1000;
      overflow-y:auto;
      background:rgba(10,24,38,.44);
      backdrop-filter:blur(4px);
      padding:24px 16px;
    }

    #contactModal .wrapper{
      width:min(900px, 100%);
      margin:0 auto;
    }

    #contactModal .card{
      margin-top:0;
      border-radius:16px;
      box-shadow:var(--shadow-lg, var(--shadow));
    }

    #contactModal.hidden{ display:none !important; }

    @media (max-width:900px){
      .grid.grid-3,
      .grid.grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div id="crm-page" data-theme="light">
    <div class="wrapper">
      <div class="row">
        <div>
          <h1>Contacts</h1>
          <p class="muted-text">Contacts are created through the workflow start endpoint. Direct database writes are disabled.</p>
        </div>
        <div class="spacer"></div>
        <a href="index.html" class="btn">🏠 Home</a>
        <button id="themeToggle" type="button">Light / Dark</button>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="newContactBtn" type="button">+ New Lead</button>
      </div>

      <div class="grid grid-3">
        <div class="card">
          <label>Total Contacts</label>
          <h2 id="statTotal">0</h2>
        </div>
        <div class="card">
          <label>Engagement / Active</label>
          <h2 id="statActive">0</h2>
        </div>
        <div class="card">
          <label>New This Month</label>
          <h2 id="statNewMonth">0</h2>
        </div>
      </div>

      <div class="card">
        <div class="grid grid-3">
          <div>
            <label for="searchInput">Search</label>
            <input id="searchInput" type="text" placeholder="Search by name, surname, email, phone, company..." />
          </div>

          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter">
              <option value="all">All statuses</option>
              <option value="engagement">Engagement</option>
              <option value="commercialization">Commercialization</option>
              <option value="reactivation">Reactivation</option>
              <option value="converted">Converted</option>
              <option value="dead">Dead</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>

          <div>
            <label for="sortBy">Sort By</label>
            <select id="sortBy">
              <option value="name-asc">Name A → Z</option>
              <option value="name-desc">Name Z → A</option>
              <option value="created-desc">Newest created</option>
              <option value="created-asc">Oldest created</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="clearFiltersBtn" type="button">Clear Filters</button>
          <button id="exportBtn" type="button">Export CSV</button>
        </div>
      </div>

      <div class="card">
        <div id="loadState" class="loading-bar" hidden></div>
        <div class="table-wrap">
          <table id="dataTable"></table>
        </div>
        <div id="tableNote" class="table-note"></div>
      </div>
    </div>
  </div>

  <div id="contactModal" class="hidden">
    <div class="wrapper">
      <div class="card">
        <div class="row">
          <div>
            <h2 id="modalTitle">New Lead</h2>
            <p class="muted-text" id="modalSubtitle">Create a workflow-owned lead</p>
          </div>
          <div class="spacer"></div>
          <button id="closeModalBtn" type="button">Close</button>
        </div>

        <form id="contactForm">
          <input type="hidden" id="formMode" value="create" />
          <input type="hidden" id="editRowId" value="" />

          <div class="grid grid-2">
            <div>
              <label for="contactName">First Name</label>
              <input id="contactName" type="text" required />
            </div>

            <div>
              <label for="contactSurname">Surname</label>
              <input id="contactSurname" type="text" />
            </div>

            <div>
              <label for="contactCompany">Company</label>
              <input id="contactCompany" type="text" />
            </div>

            <div>
              <label for="contactEmail">Email</label>
              <input id="contactEmail" type="email" required />
            </div>

            <div>
              <label for="contactPhone">Phone</label>
              <input id="contactPhone" type="text" />
            </div>

            <div>
              <label for="location">Location</label>
              <input id="location" type="text" />
            </div>

            <div>
              <label for="serviceCategory">Service Category</label>
              <input id="serviceCategory" type="text" />
            </div>

            <div>
              <label for="source">Source</label>
              <input id="source" type="text" placeholder="frontend" />
            </div>

            <div class="grid-full col-span-full">
              <label for="requestDetail">Request Detail</label>
              <input id="requestDetail" type="text" />
            </div>
          </div>

          <div class="actions">
            <button id="deleteBtn" type="button" class="remove-btn hidden">Delete</button>
            <button id="cancelBtn" type="button">Cancel</button>
            <button id="saveBtn" type="submit" class="submit-btn">Start Lead Workflow</button>
          </div>
        </form>

        <div id="contactWorkOrders" class="work-orders-container" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const root = document.getElementById("crm-page");
      const table = document.getElementById("dataTable");
      const loadState = document.getElementById("loadState");
      const tableNote = document.getElementById("tableNote");

      const statTotal = document.getElementById("statTotal");
      const statActive = document.getElementById("statActive");
      const statNewMonth = document.getElementById("statNewMonth");

      const themeToggle = document.getElementById("themeToggle");
      const refreshBtn = document.getElementById("refreshBtn");
      const newContactBtn = document.getElementById("newContactBtn");
      const clearFiltersBtn = document.getElementById("clearFiltersBtn");
      const exportBtn = document.getElementById("exportBtn");

      const searchInput = document.getElementById("searchInput");
      const statusFilter = document.getElementById("statusFilter");
      const sortBy = document.getElementById("sortBy");

      const modal = document.getElementById("contactModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalSubtitle = document.getElementById("modalSubtitle");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const contactForm = document.getElementById("contactForm");
      const formMode = document.getElementById("formMode");
      const editRowId = document.getElementById("editRowId");
      const linkedOrders = document.getElementById("contactWorkOrders");

      const WORKFLOW_ROOT = window.APP_CONFIG.WORKFLOW_API_BASE;
      const POSTGRES_ROOT = window.APP_CONFIG.POSTGRES_API_BASE;
      const REQUEST_TIMEOUT_MS = 8000;
      const PAGE_SIZE = 500;

      if (!WORKFLOW_ROOT) {
        alert("WORKFLOW_API_BASE is missing from config.js");
      }

      if (!POSTGRES_ROOT) {
        alert("POSTGRES_API_BASE is missing from config.js");
      }

      const CONTACT_READ_ENDPOINTS = [
        `${POSTGRES_ROOT}/api_contacts`,
        `${POSTGRES_ROOT}/contacts?limit=${PAGE_SIZE}`
      ];

      const WORK_ORDERS_URL = `${POSTGRES_ROOT}/work_orders?limit=5000`;
      const WORK_ITEMS_URL = `${POSTGRES_ROOT}/work_items?limit=10000`;

      let rawRows = [];
      let filteredRows = [];
      let workOrderCache = null;
      let workItemCache = null;
      let workOrdersByContact = new Map();
      let workItemsByOrder = new Map();

      const FIELD_MAP = {
        id:["ContactId","contact_id","contactId","Id","ID","id"],
        workflowInstanceId:["workflow_instance_id","WorkflowInstanceId","workflowInstanceId"],
        accountId:["AccountId","account_id","accountId"],
        firstName:["ContactName","contact_name","contactName","FirstName","first_name","Name","name"],
        surname:["ContactSurname","contact_surname","contactSurname","Surname","surname","LastName","last_name"],
        company:["ContactCompany","contact_company","contactCompany","Company","company"],
        industry:["ContactIndustry","contact_industry","contactIndustry","Industry","industry"],
        email:["ContactEmail","contact_email","contactEmail","EmailAddress","email_address","Email","email"],
        phone:["ContactPhone","contact_phone","contactPhone","TelephoneNumber","PhoneNumber","phone_number","Phone","phone"],
        jobTitle:["ContactJobTitle","contact_job_title","contactJobTitle","JobTitle","job_title"],
        owner:["ContactOwner","contact_owner","contactOwner","Owner","owner"],
        role:["ContactRole","contact_role","contactRole","Role","role"],
        requestDetail:["ContactRequestDetail","contact_request_detail","contactRequestDetail","RequestDetail","request_detail","Notes","Comment","Description"],
        statusId:["ContactStatusId","contact_status_id","contactStatusId","StatusId","status_id","Status","status"],
        location:["Location","location","City","city"],
        serviceCategory:["ServiceCategory","service_category","serviceCategory"],
        source:["Source","source"],
        submitPage:["SubmitPage","submit_page","submitPage"],
        searchTerm:["SearchTerm","search_term","searchTerm"],
        created:["CreateDateTime","create_date","created_at","CreatedDate","CreatedOn","created"],
        updated:["ModifiedDateTime","updated_at","UpdateDateTime","ModifiedDate","UpdatedOn","updated"]
      };

      themeToggle.addEventListener("click", () => {
        root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
      });

      refreshBtn.addEventListener("click", () => loadData(true));
      newContactBtn.addEventListener("click", () => openModal("create"));
      clearFiltersBtn.addEventListener("click", clearFilters);
      exportBtn.addEventListener("click", exportCsv);

      searchInput.addEventListener("input", applyFiltersAndRender);
      statusFilter.addEventListener("change", applyFiltersAndRender);
      sortBy.addEventListener("change", applyFiltersAndRender);

      closeModalBtn.addEventListener("click", closeModal);
      cancelBtn.addEventListener("click", closeModal);
      deleteBtn.addEventListener("click", handleDelete);
      contactForm.addEventListener("submit", handleSave);

      modal.addEventListener("click", e => {
        if (e.target === modal) closeModal();
      });

      async function loadData(forceRefresh = false){
        setLoading("Loading contacts...");
        table.innerHTML = "<thead><tr><th>Loading contacts...</th></tr></thead>";
        tableNote.textContent = "";

        try {
          if (forceRefresh) resetLinkedWorkCache();
          const result = await fetchFirstAvailable(CONTACT_READ_ENDPOINTS);
          rawRows = rowsFromResult(result).map(normalizeRow);
          applyFiltersAndRender();
        } catch (err) {
          table.innerHTML = `<thead><tr><th>Error: ${escapeHtml(err.message)}</th></tr></thead>`;
          console.error(err);
        } finally {
          clearLoading();
        }
      }

      async function fetchFirstAvailable(urls){
        const requests = urls.filter(Boolean).map(url => fetchJson(url));
        if (!requests.length) throw new Error("No contact endpoints configured");
        return Promise.any(requests);
      }

      async function fetchJson(url){
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

        try {
          const res = await fetch(url, {
            signal:controller.signal,
            headers:{ "Accept":"application/json" }
          });
          const text = await res.text();

          let result;
          try {
            result = text ? JSON.parse(text) : {};
          } catch (_) {
            throw new Error(`${url}: endpoint returned non-JSON response`);
          }

          if (!res.ok || result.ok === false) {
            throw new Error(`${url}: ${result.error || res.status + " " + res.statusText}`);
          }

          return result;
        } catch (err) {
          if (err.name === "AbortError") {
            throw new Error(`${url}: request timed out after ${REQUEST_TIMEOUT_MS / 1000}s`);
          }

          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      function rowsFromResult(result){
        if (Array.isArray(result)) return result;
        if (Array.isArray(result?.rows)) return result.rows;
        if (Array.isArray(result?.data)) return result.data;
        return [];
      }

      function normalizeRow(row){
        const firstName = getFirst(row, FIELD_MAP.firstName);
        const surname = getFirst(row, FIELD_MAP.surname);
        const fullName = [firstName, surname].filter(Boolean).join(" ").trim();

        return {
          raw:row,
          id:getFirst(row, FIELD_MAP.id),
          workflowInstanceId:getFirst(row, FIELD_MAP.workflowInstanceId),
          accountId:getFirst(row, FIELD_MAP.accountId),
          firstName,
          surname,
          name:fullName || firstName || surname || "",
          company:getFirst(row, FIELD_MAP.company),
          industry:getFirst(row, FIELD_MAP.industry),
          email:getFirst(row, FIELD_MAP.email),
          phone:getFirst(row, FIELD_MAP.phone),
          jobTitle:getFirst(row, FIELD_MAP.jobTitle),
          owner:getFirst(row, FIELD_MAP.owner),
          role:getFirst(row, FIELD_MAP.role),
          requestDetail:getFirst(row, FIELD_MAP.requestDetail),
          statusId:getFirst(row, FIELD_MAP.statusId),
          status:normalizeStatus(getFirst(row, FIELD_MAP.statusId)),
          location:getFirst(row, FIELD_MAP.location),
          serviceCategory:getFirst(row, FIELD_MAP.serviceCategory),
          source:getFirst(row, FIELD_MAP.source),
          submitPage:getFirst(row, FIELD_MAP.submitPage),
          searchTerm:getFirst(row, FIELD_MAP.searchTerm),
          created:getFirst(row, FIELD_MAP.created),
          updated:getFirst(row, FIELD_MAP.updated)
        };
      }

      function getFirst(obj, keys){
        for (const key of keys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }
        return "";
      }

      function normalizeStatus(value){
        const str = String(value || "").trim().toLowerCase();

        if (!str) return "Unknown";
        if (["engagement","commercialization","reactivation","converted","dead","kyc","flagged","approved","barred","onboarded"].includes(str)) return str;
        if (["1","active","enabled","open","true","yes"].includes(str)) return "Active";
        if (["0","inactive","disabled","closed","false","no"].includes(str)) return "Inactive";
        if (str.includes("draft") || str === "2" || str === "pending") return "Draft";

        return str;
      }

      function applyFiltersAndRender(){
        const search = searchInput.value.trim().toLowerCase();
        const status = statusFilter.value;
        const sort = sortBy.value;

        filteredRows = rawRows.filter(row => {
          const haystack = [
            row.id,
            row.workflowInstanceId,
            row.accountId,
            row.name,
            row.firstName,
            row.surname,
            row.company,
            row.industry,
            row.email,
            row.phone,
            row.jobTitle,
            row.owner,
            row.role,
            row.requestDetail,
            row.location,
            row.serviceCategory,
            row.source,
            row.status
          ].join(" ").toLowerCase();

          const matchesSearch = !search || haystack.includes(search);
          const matchesStatus = status === "all"
            ? true
            : status === "unknown"
            ? !row.status || row.status === "Unknown"
            : String(row.status).toLowerCase() === status;

          return matchesSearch && matchesStatus;
        });

        filteredRows.sort((a, b) => {
          switch (sort) {
            case "name-desc": return compareText(b.name, a.name);
            case "created-desc": return compareDate(b.created, a.created);
            case "created-asc": return compareDate(a.created, b.created);
            case "name-asc":
            default: return compareText(a.name, b.name);
          }
        });

        renderStats(filteredRows);
        renderTable(filteredRows);
        tableNote.textContent = `${filteredRows.length} contact${filteredRows.length === 1 ? "" : "s"} shown.`;
      }

      function renderStats(rows){
        statTotal.textContent = rows.length;
        statActive.textContent = rows.filter(r => ["engagement","active","commercialization"].includes(String(r.status).toLowerCase())).length;

        const now = new Date();
        statNewMonth.textContent = rows.filter(r => {
          const d = new Date(r.created);
          return !isNaN(d.getTime()) && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
      }

      function renderTable(rows){
        if (!rows.length) {
          table.innerHTML = `
            <thead><tr><th>Contact</th><th>Company</th><th>Email</th><th>Phone</th><th>Status</th><th>Workflow</th><th>Location</th><th>Created</th><th>Updated</th><th>Actions</th></tr></thead>
            <tbody><tr><td colspan="10"><div class="empty-state">No contacts match the current filters.</div></td></tr></tbody>`;
          return;
        }

        table.innerHTML = `
          <thead>
            <tr>
              <th>Contact</th>
              <th>Company</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Workflow</th>
              <th>Location</th>
              <th>Created</th>
              <th>Updated</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>
                  <div class="contact-name">${escapeHtml(row.name || "Unnamed Contact")}</div>
                  <span class="contact-sub">Contact ID: ${escapeHtml(row.id || "-")}</span>
                </td>
                <td>${escapeHtml(row.company || "-")}</td>
                <td>${escapeHtml(row.email || "-")}</td>
                <td>${escapeHtml(row.phone || "-")}</td>
                <td>${renderStatusBadge(row.status)}</td>
                <td>
                  ${row.workflowInstanceId
                    ? `<span class="contact-sub">${escapeHtml(row.workflowInstanceId)}</span>`
                    : `<span class="contact-sub">Not linked</span>`}
                </td>
                <td>${escapeHtml(row.location || "-")}</td>
                <td>${formatDate(row.created)}</td>
                <td>${formatDate(row.updated)}</td>
                <td>
                  <div class="row-actions">
                    <button type="button" data-action="view" data-id="${escapeHtml(String(row.id))}">View</button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>`;

        table.querySelectorAll("[data-action='view']").forEach(btn => {
          btn.addEventListener("click", () => {
            const row = rows.find(r => String(r.id) === btn.dataset.id);
            if (row) openModal("view", row);
          });
        });
      }

      function openModal(mode, row = null){
        formMode.value = mode;
        editRowId.value = row?.id || "";

        const isView = mode === "view";

        modalTitle.textContent = mode === "create" ? "New Lead" : "View Contact";
        modalSubtitle.textContent = mode === "create"
          ? "Create a workflow-owned lead"
          : "View contact information. Direct editing is disabled.";

        document.getElementById("contactName").value = row?.firstName || "";
        document.getElementById("contactSurname").value = row?.surname || "";
        document.getElementById("contactCompany").value = row?.company || "";
        document.getElementById("contactEmail").value = row?.email || "";
        document.getElementById("contactPhone").value = row?.phone || "";
        document.getElementById("location").value = row?.location || "";
        document.getElementById("serviceCategory").value = row?.serviceCategory || "";
        document.getElementById("source").value = row?.source || "";
        document.getElementById("requestDetail").value = row?.requestDetail || "";

        Array.from(contactForm.querySelectorAll("input, select")).forEach(el => {
          if (el.type !== "hidden") el.disabled = isView;
        });

        deleteBtn.classList.add("hidden");
        document.getElementById("saveBtn").classList.toggle("hidden", isView);

        loadContactWorkOrders(mode === "create" ? null : row?.id);
        modal.classList.remove("hidden");
      }

      function closeModal(){
        modal.classList.add("hidden");
        contactForm.reset();
        formMode.value = "create";
        editRowId.value = "";
        deleteBtn.classList.add("hidden");
        document.getElementById("saveBtn").classList.remove("hidden");

        Array.from(contactForm.querySelectorAll("input, select")).forEach(el => {
          if (el.type !== "hidden") el.disabled = false;
        });

        linkedOrders.innerHTML = "";
      }

      async function handleSave(e){
        e.preventDefault();

        const mode = formMode.value;

        if (mode !== "create") {
          alert("Direct contact editing is disabled. Use workflow actions instead.");
          return;
        }

        const payload = {
          name: document.getElementById("contactName").value.trim(),
          surname: document.getElementById("contactSurname").value.trim(),
          company: document.getElementById("contactCompany").value.trim(),
          email: document.getElementById("contactEmail").value.trim(),
          phone: document.getElementById("contactPhone").value.trim(),
          location: document.getElementById("location").value.trim(),
          service_category: document.getElementById("serviceCategory").value.trim(),
          source: document.getElementById("source").value.trim() || "frontend",
          request_detail: document.getElementById("requestDetail").value.trim(),
          submit_page: "contacts_page"
        };

        try {
          const res = await fetch(`${WORKFLOW_ROOT}/workflow/start`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const result = await res.json().catch(() => ({}));

          if (!res.ok || result.ok === false) {
            throw new Error(result.detail || result.error || "Workflow request failed");
          }

          closeModal();
          resetLinkedWorkCache();
          await loadData(true);

          alert(`Lead workflow started. Workflow ID: ${result.workflowInstanceId}`);
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      }

      async function handleDelete(){
        alert("Direct delete is disabled. Use a workflow action such as mark_dead.");
      }

      async function loadContactWorkOrders(recordId){
        if (!recordId) {
          linkedOrders.innerHTML = "";
          return;
        }

        linkedOrders.innerHTML = '<p class="muted-text">Loading linked work orders...</p>';

        try {
          await ensureLinkedWorkCache();
          const orders = workOrdersByContact.get(String(recordId)) || [];

          if (!orders.length) {
            linkedOrders.innerHTML = '<h3>Work Orders</h3><p class="muted-text">No linked work orders found.</p>';
            return;
          }

          linkedOrders.innerHTML = renderLinkedWorkOrders(orders);
        } catch (err) {
          console.error(err);
          linkedOrders.innerHTML = `<h3>Work Orders</h3><p>Error: ${escapeHtml(err.message)}</p>`;
        }
      }

      async function ensureLinkedWorkCache(){
        if (workOrderCache && workItemCache) return;

        const [ordersResult, itemsResult] = await Promise.allSettled([
          fetchJson(WORK_ORDERS_URL),
          fetchJson(WORK_ITEMS_URL)
        ]);

        if (ordersResult.status === "rejected") throw ordersResult.reason;

        workOrderCache = rowsFromResult(ordersResult.value);
        workItemCache = itemsResult.status === "fulfilled" ? rowsFromResult(itemsResult.value) : [];
        workItemsByOrder = groupItemsByOrder(workItemCache);
        workOrdersByContact = groupOrdersByContact(workOrderCache);
      }

      function resetLinkedWorkCache(){
        workOrderCache = null;
        workItemCache = null;
        workOrdersByContact = new Map();
        workItemsByOrder = new Map();
      }

      function groupOrdersByContact(orders){
        const map = new Map();

        orders.forEach(order => {
          const contactId = String(getVal(order, ["ContactId","contact_id","contactId"], ""));
          if (!contactId) return;

          if (!map.has(contactId)) map.set(contactId, []);
          map.get(contactId).push(order);
        });

        return map;
      }

      function groupItemsByOrder(items){
        const map = new Map();

        items.forEach(item => {
          const orderId = String(getLinkedItemOrderId(item));
          if (!orderId) return;

          if (!map.has(orderId)) map.set(orderId, []);
          map.get(orderId).push(item);
        });

        return map;
      }

      function renderLinkedWorkOrders(orders){
        let html = '<h3>Work Orders</h3>';

        orders.forEach(order => {
          const orderId = getLinkedOrderId(order) || "-";
          const items = workItemsByOrder.get(String(orderId)) || [];
          const ref = getVal(order, ["EntityRefNo","entity_ref_no","RefNo"], "");
          const created = formatDate(getVal(order, ["CreateDateTime","created_at","CreatedDate","CreatedOn"], ""));
          const total = numberOrFallback(getVal(order, ["Total","total"], ""), items.reduce((sum,item) => sum + calcItem(item).lineTotal, 0));
          const anf = numberOrFallback(getVal(order, ["ANF","anf","GrossProfit","gross_profit"], ""), items.reduce((sum,item) => sum + calcItem(item).gross, 0));

          const itemRows = items.map(item => {
            const c = calcItem(item);
            return `<tr>
              <td>${escapeHtml(getVal(item, ["ServiceCode","service_code","Service"], "-"))}</td>
              <td>${escapeHtml(getVal(item, ["ProductCode","product_code","Product"], "-"))}</td>
              <td>${escapeHtml(getVal(item, ["RegionCode","region_code","Region"], "-"))}</td>
              <td class="num">${formatNumber(c.qty)}</td>
              <td class="num">${formatNumber(c.unit)}</td>
              <td class="num">${formatNumber(c.lineTotal)}</td>
              <td class="num">${formatNumber(c.cost)}</td>
              <td class="num">${formatNumber(c.gross)}</td>
              <td class="num">${c.lineTotal ? formatNumber(c.margin) + "%" : "-"}</td>
            </tr>`;
          }).join("");

          html += `<details>
            <summary>
              <span>Work Order #${escapeHtml(orderId)}${ref ? ` <span class="muted-text">${escapeHtml(ref)}</span>` : ""}<br><span class="muted-text">Created: ${created}</span></span>
              <span class="num">Total: ${formatNumber(total)}<br>ANF: ${formatNumber(anf)}</span>
            </summary>
            <div style="overflow-x:auto;">
              <table>
                <thead><tr><th>Service</th><th>Product</th><th>Region</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Line Total</th><th class="num">Cost</th><th class="num">ANF</th><th class="num">Margin</th></tr></thead>
                <tbody>${itemRows || '<tr><td colspan="9">No work items found.</td></tr>'}</tbody>
              </table>
            </div>
          </details>`;
        });

        return html;
      }

      function calcItem(item){
        const qty = num(getVal(item, ["Quantity","quantity","qty","Qty"], 0));
        const unit = num(getVal(item, ["UnitPrice","unit_price","unitPrice","Price"], 0));
        const storedTotal = getVal(item, ["LineTotal","line_total","lineTotal"], "");
        const lineTotal = storedTotal !== "" ? num(storedTotal) : qty * unit;
        const cost = num(getVal(item, ["EstimatedCost","estimated_cost","Cost","cost"], 0));
        const storedGross = getVal(item, ["GrossProfit","gross_profit","ANF","anf"], "");
        const gross = storedGross !== "" ? num(storedGross) : lineTotal - cost;
        const storedMargin = getVal(item, ["GrossMarginPct","gross_margin_pct"], "");
        const margin = storedMargin !== "" ? num(storedMargin) : (lineTotal ? (gross / lineTotal) * 100 : 0);

        return { qty, unit, lineTotal, cost, gross, margin };
      }

      function getLinkedObjectId(obj, explicitKeys){
        for (const key of explicitKeys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }

        const dynamicKey = Object.keys(obj).find(key => {
          const normal = key.toLowerCase().replace(/[^a-z0-9]/g, "");
          return normal === "workorderid" || normal === "workordersid";
        });

        return dynamicKey ? obj[dynamicKey] : "";
      }

      function getLinkedOrderId(order){
        return getLinkedObjectId(order, ["work_order_id","WorkOrderId","WorkOrderID","workOrderId","Id","ID","id"]);
      }

      function getLinkedItemOrderId(item){
        return getLinkedObjectId(item, ["work_order_id","WorkOrderId","WorkOrderID","workOrderId"]);
      }

      function exportCsv(){
        const headers = ["ID","Workflow ID","First Name","Surname","Company","Email","Phone","Status","Location","Account ID","Created","Updated"];

        const lines = [headers.join(",")].concat(filteredRows.map(row => [
          csvValue(row.id),
          csvValue(row.workflowInstanceId),
          csvValue(row.firstName),
          csvValue(row.surname),
          csvValue(row.company),
          csvValue(row.email),
          csvValue(row.phone),
          csvValue(row.status),
          csvValue(row.location),
          csvValue(row.accountId),
          csvValue(row.created),
          csvValue(row.updated)
        ].join(",")));

        const blob = new Blob([lines.join("\n")], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = "contacts.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
      }

      function clearFilters(){
        searchInput.value = "";
        statusFilter.value = "all";
        sortBy.value = "name-asc";
        applyFiltersAndRender();
      }

      function renderStatusBadge(status){
        const value = String(status || "Unknown");
        const key = value.toLowerCase();

        let cls = "status-info";

        if (["active","open","enabled","engagement","commercialization","converted","onboarded"].includes(key)) cls = "status-active";
        if (["inactive","closed","disabled","dead","barred"].includes(key)) cls = "status-inactive";
        if (["draft","pending","reactivation","kyc","flagged"].includes(key)) cls = "status-draft";

        return `<span class="status-badge ${cls}">${escapeHtml(value)}</span>`;
      }

      function getVal(obj, keys, fallback=""){
        for (const key of keys) {
          if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") return obj[key];
        }

        return fallback;
      }

      function compareText(a, b){
        return String(a || "").localeCompare(String(b || ""));
      }

      function compareDate(a, b){
        return parseDateSafe(a) - parseDateSafe(b);
      }

      function parseDateSafe(value){
        const d = new Date(value);
        return isNaN(d.getTime()) ? 0 : d.getTime();
      }

      function num(value){
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function numberOrFallback(value, fallback){
        return value === "" || value === null || value === undefined ? fallback : num(value);
      }

      function formatNumber(value){
        const n = Number(value);
        return Number.isFinite(n) ? n.toLocaleString("en-ZA", { minimumFractionDigits:2, maximumFractionDigits:2 }) : "-";
      }

      function formatDate(value){
        if (!value) return "-";

        const d = new Date(value);

        return isNaN(d.getTime())
          ? escapeHtml(String(value))
          : escapeHtml(d.toLocaleDateString("en-ZA", { day:"2-digit", month:"short", year:"numeric" }));
      }

      function csvValue(value){
        return `"${String(value ?? "").replaceAll('"', '""')}"`;
      }

      function escapeHtml(str){
        return String(str ?? "")
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#039;");
      }

      function setLoading(message){
        loadState.hidden = false;
        loadState.innerHTML = `<span>${escapeHtml(message)}</span><span>Timeout: ${REQUEST_TIMEOUT_MS / 1000}s</span>`;
      }

      function clearLoading(){
        loadState.hidden = true;
        loadState.textContent = "";
      }

      loadData();
    })();
  </script>
</body>
</html>
