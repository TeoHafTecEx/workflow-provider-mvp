<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work Orders – TGC CRM</title>
<style>
/* Shared CRM styles */
:root{
  --page-bg:#f4f7fb;
}
*, *::before, *::after{ box-sizing:border-box; }
html,body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
}
body{
  background:var(--page-bg);
  font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
}
#crm-page[data-theme="dark"]{
  --main:#FFFFFF;
  --secondary:#0A1826;
  --accent:#D3A911;
  --panel:#0f2234;
  --border:#133147;
  --muted:#9fb3c8;
  --head:#0e1d2b;
  --btnText:#0A1826;
  --shadow:0 6px 20px rgba(0,0,0,.25);
}
#crm-page[data-theme="light"]{
  --main:#0A1826;
  --secondary:#FFFFFF;
  --accent:#D3A911;
  --panel:#ffffff;
  --border:#e6ecf3;
  --muted:#5b6b7a;
  --head:#f6f8fb;
  --btnText:#0A1826;
  --shadow:0 6px 18px rgba(10,24,38,.08);
}
#crm-page{
  background:var(--secondary);
  color:var(--main);
  width:100%;
  min-height:100vh;
  padding:20px 14px 40px;
}
.wrapper{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}
.brandbar{
  height:4px;
  background:linear-gradient(90deg,#fff 0,#fff 33%,#0A1826 33%,#0A1826 66%,#D3A911 66%);
  border-radius:4px;
  margin:0 auto 16px;
  width:100%;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.spacer{ flex:1; }
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
}
.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  border:1px solid var(--border);
  border-radius:12px;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
thead th{
  background:var(--head);
  color:var(--main);
  font-weight:700;
  padding:12px 10px;
  border-bottom:1px solid var(--border);
  text-align:left;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
td{
  background:var(--panel);
  padding:10px 8px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  overflow:hidden;
  text-overflow:ellipsis;
}
button, a.btn{
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  background:transparent;
  color:var(--accent);
  cursor:pointer;
  text-decoration:none;
  transition:background .15s ease, color .15s ease;
}
button:hover, a.btn:hover{
  background:var(--accent);
  color:var(--btnText);
}
.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.muted-text{ color:var(--muted); font-size:12px; }
.work-items-wrap{ padding:0; border:0; }
.work-items-table{ width:100%; border-collapse:collapse; table-layout:fixed; }
.toggle-btn{ min-width:44px; }
</style>
</head>
<body>
<div id="crm-page" data-theme="light">
  <div class="wrapper">
    <div class="brandbar" aria-hidden="true"></div>
    <div class="row">
      <h1 style="margin:0;font-size:24px;">Work Orders</h1>
      <div class="spacer"></div>
      <a href="index.html" class="btn" style="margin-right:8px;">🏠 Home</a>
      <button id="themeToggle" class="btn" type="button">Light / Dark</button>
      <button id="refresh" class="btn" type="button">Refresh</button>
    </div>
    <div class="card" style="margin-top:16px;">
      <div class="table-wrap">
        <table id="dataTable"></table>
      </div>
    </div>
  </div>
</div>
<!-- Load global configuration for API endpoints -->
<script src="config.js"></script>
<script>
(function(){
  const root = document.getElementById('crm-page');
  const table = document.getElementById('dataTable');
  const API_ROOT = window.APP_CONFIG.API_BASE || window.APP_CONFIG.POSTGRES_API_BASE || '';
  const POSTGRES_ROOT = window.APP_CONFIG.POSTGRES_API_BASE || API_ROOT;
  const WORK_ORDER_READ_ENDPOINTS = [
    `${POSTGRES_ROOT}/work_orders`,
    `${API_ROOT}/work_orders`,
    `${API_ROOT}/api_work_orders`,
    `${POSTGRES_ROOT}/work-orders`,
    `${API_ROOT}/work-orders`
  ].filter(Boolean);
  const WORK_ITEM_READ_ENDPOINTS = [
    `${POSTGRES_ROOT}/work_items`,
    `${API_ROOT}/work_items`,
    `${API_ROOT}/api_work_items`,
    `${POSTGRES_ROOT}/work-items`,
    `${API_ROOT}/work-items`
  ].filter(Boolean);

  document.getElementById('themeToggle').onclick = () => {
    root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
  };
  document.getElementById('refresh').onclick = loadData;

  async function loadData(){
    table.innerHTML = '<thead><tr><th>Loading work orders...</th></tr></thead>';
    try {
      const orderResult = await fetchJsonFrom(
        WORK_ORDER_READ_ENDPOINTS,
        'Failed to load work orders'
      );
      const orders = rowsFromResult(orderResult);
      const ordersWithItems = await Promise.all(orders.map(async order => {
        const orderId = getOrderId(order);
        let items = [];
        if (orderId !== undefined && orderId !== null && orderId !== '') {
          try {
            const itemResult = await fetchJsonFrom(
              WORK_ITEM_READ_ENDPOINTS,
              'Failed to load work items'
            );
            items = rowsFromResult(itemResult).filter(item =>
              String(item.WorkOrderId ?? item.work_order_id ?? item.workOrderId ?? '') === String(orderId)
            );
          } catch (err) {
            console.error(err);
          }
        }
        return { order, items };
      }));
      buildTable(ordersWithItems);
    } catch(err) {
      table.innerHTML = `<thead><tr><th>Error: ${escapeHtml(err.message)}</th></tr></thead>`;
      console.error(err);
    }
  }

  async function fetchJsonFrom(urls, fallbackMessage){
    const errors = [];
    for (const url of urls) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        let result;
        try { result = text ? JSON.parse(text) : {}; }
        catch (_) { throw new Error('Endpoint returned HTML or another non-JSON response'); }
        if (!res.ok || result.ok === false) throw new Error(result.error || `${res.status} ${res.statusText}`);
        return result;
      } catch (err) {
        errors.push(`${url}: ${err.message}`);
      }
    }
    throw new Error(`${fallbackMessage}. ${errors.join(' | ')}`);
  }

  function rowsFromResult(result){
    return Array.isArray(result?.rows) ? result.rows : Array.isArray(result) ? result : [];
  }

  function getOrderId(order){
    return order.WorkOrderId ?? order.work_order_id ?? order.workOrderId ?? order.Id ?? order.ID;
  }

  function buildTable(data){
    if(!Array.isArray(data) || data.length === 0){
      table.innerHTML = '<thead><tr><th>No work orders available</th></tr></thead>';
      return;
    }
    table.innerHTML = `
      <thead>
        <tr>
          <th>Work Order</th>
          <th>Account</th>
          <th>Contact</th>
          <th class="num">Total</th>
          <th class="num">ANF</th>
          <th>Created</th>
          <th>Updated</th>
          <th>Expand</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(renderOrderPair).join('')}
      </tbody>`;
    table.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemRow = btn.closest('tr').nextElementSibling;
        const open = itemRow.style.display !== 'none';
        itemRow.style.display = open ? 'none' : '';
        btn.textContent = open ? '▸' : '▾';
      });
    });
  }

  function renderOrderPair({ order, items }){
    const orderId = getOrderId(order) ?? '-';
    const accountId = order.AccountId ?? order.account_id ?? order.accountId ?? '-';
    const contactId = order.ContactId ?? order.contact_id ?? order.contactId ?? '-';
    const ref = order.EntityRefNo ?? order.entity_ref_no ?? order.RefNo ?? '';
    const created = formatDate(order.CreateDateTime ?? order.created_at ?? order.CreatedDate ?? order.CreatedOn);
    const updated = formatDate(order.ModifiedDateTime ?? order.updated_at ?? order.UpdatedOn ?? order.UpdateDateTime);
    const total = Number(order.Total ?? order.total ?? 0);
    const anf = Number(order.ANF ?? order.anf ?? order.GrossProfit ?? order.gross_profit ?? 0);
    const itemRows = items.map(renderItem).join('') || '<tr><td colspan="9">No work items found.</td></tr>';
    return `
      <tr>
        <td><strong>${escapeHtml(orderId)}</strong>${ref ? `<br><span class="muted-text">${escapeHtml(ref)}</span>` : ''}</td>
        <td>${escapeHtml(accountId)}</td>
        <td>${escapeHtml(contactId)}</td>
        <td class="num">${formatNumber(total)}</td>
        <td class="num">${formatNumber(anf)}</td>
        <td>${created}</td>
        <td>${updated}</td>
        <td style="text-align:center;"><button type="button" class="toggle-btn">▸</button></td>
      </tr>
      <tr style="display:none;">
        <td colspan="8" class="work-items-wrap">
          <table class="work-items-table">
            <thead><tr><th>Service</th><th>Product</th><th>Region</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Line Total</th><th class="num">Cost</th><th class="num">ANF</th><th class="num">Margin</th></tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
        </td>
      </tr>`;
  }

  function renderItem(item){
    const service = item.ServiceCode ?? item.service_code ?? item.Service ?? '-';
    const product = item.ProductCode ?? item.product_code ?? item.Product ?? '-';
    const region = item.RegionCode ?? item.region_code ?? item.Region ?? '-';
    const qty = Number(item.Quantity ?? item.quantity ?? 0);
    const unit = Number(item.UnitPrice ?? item.unit_price ?? 0);
    const lineTotal = Number(item.LineTotal ?? item.line_total ?? (qty * unit));
    const cost = Number(item.EstimatedCost ?? item.estimated_cost ?? item.Cost ?? 0);
    const gross = Number(item.GrossProfit ?? item.gross_profit ?? (lineTotal - cost));
    const margin = Number(item.GrossMarginPct ?? item.gross_margin_pct ?? (lineTotal ? (gross / lineTotal) * 100 : 0));
    return `<tr><td>${escapeHtml(service)}</td><td>${escapeHtml(product)}</td><td>${escapeHtml(region)}</td><td class="num">${formatNumber(qty)}</td><td class="num">${formatNumber(unit)}</td><td class="num">${formatNumber(lineTotal)}</td><td class="num">${formatNumber(cost)}</td><td class="num">${formatNumber(gross)}</td><td class="num">${lineTotal ? formatNumber(margin) + '%' : '-'}</td></tr>`;
  }

  function formatNumber(value){
    const n = Number(value);
    if (!Number.isFinite(n)) return '-';
    return n.toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function formatDate(value){
    if(!value) return '-';
    const d = new Date(value);
    if (isNaN(d.getTime())) return escapeHtml(value);
    return d.toLocaleDateString('en-ZA', { day:'2-digit', month:'short', year:'numeric' });
  }
  function escapeHtml(value){
    return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
  }
  loadData();
})();
</script>
</body>
</html>
