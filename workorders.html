<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work Orders – TGC CRM</title>
<style>
:root{ --page-bg:#f4f7fb; }
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; width:100%; overflow-x:hidden; }
body{ background:var(--page-bg); font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif; }
#crm-page[data-theme="dark"]{ --main:#FFFFFF; --secondary:#0A1826; --accent:#D3A911; --panel:#0f2234; --border:#133147; --muted:#9fb3c8; --head:#0e1d2b; --btnText:#0A1826; --shadow:0 6px 20px rgba(0,0,0,.25); }
#crm-page[data-theme="light"]{ --main:#0A1826; --secondary:#FFFFFF; --accent:#D3A911; --panel:#ffffff; --border:#e6ecf3; --muted:#5b6b7a; --head:#f6f8fb; --btnText:#0A1826; --shadow:0 6px 18px rgba(10,24,38,.08); }
#crm-page{ background:var(--secondary); color:var(--main); width:100%; min-height:100vh; padding:20px 14px 40px; }
.wrapper{ width:100%; max-width:1400px; margin:0 auto; }
.brandbar{ height:4px; background:linear-gradient(90deg,#fff 0,#fff 33%,#0A1826 33%,#0A1826 66%,#D3A911 66%); border-radius:4px; margin:0 auto 16px; width:100%; }
.row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.spacer{ flex:1; }
.card{ background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px; width:100%; }
.table-wrap{ width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border); border-radius:12px; }
table{ width:100%; border-collapse:collapse; table-layout:fixed; }
thead th{ background:var(--head); color:var(--main); font-weight:700; padding:12px 10px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
td{ background:var(--panel); padding:10px 8px; border-bottom:1px solid var(--border); vertical-align:middle; overflow:hidden; text-overflow:ellipsis; }
button,a.btn{ border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; background:transparent; color:var(--accent); cursor:pointer; text-decoration:none; transition:background .15s ease,color .15s ease; }
button:hover,a.btn:hover{ background:var(--accent); color:var(--btnText); }
.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.muted-text{ color:var(--muted); font-size:12px; }
.work-items-wrap{ padding:0; border:0; }
.work-items-table{ width:100%; border-collapse:collapse; table-layout:fixed; }
</style>
</head>
<body>
<div id="crm-page" data-theme="light">
  <div class="wrapper">
    <div class="brandbar" aria-hidden="true"></div>
    <div class="row">
      <h1 style="margin:0;font-size:24px;">Work Orders</h1>
      <div class="spacer"></div>
      <a href="index.html" class="btn" style="margin-right:8px;">🏠 Home</a>
      <button id="themeToggle" class="btn" type="button">Light / Dark</button>
      <button id="refresh" class="btn" type="button">Refresh</button>
    </div>
    <div class="card" style="margin-top:16px;">
      <div class="table-wrap"><table id="dataTable"></table></div>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script>
(function(){
  const root = document.getElementById('crm-page');
  const table = document.getElementById('dataTable');
  const API_ROOT = window.APP_CONFIG.API_BASE || window.APP_CONFIG.POSTGRES_API_BASE || '';
  const POSTGRES_ROOT = window.APP_CONFIG.POSTGRES_API_BASE || API_ROOT;
  const WORK_ORDERS_URL = `${POSTGRES_ROOT}/work_orders`;
  const WORK_ITEMS_URL = `${POSTGRES_ROOT}/work_items`;

  document.getElementById('themeToggle').onclick = () => {
    root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
  };
  document.getElementById('refresh').onclick = loadData;

  async function loadData(){
    table.innerHTML = '<thead><tr><th>Loading work orders...</th></tr></thead>';
    try {
      const orders = rowsFromResult(await fetchJson(WORK_ORDERS_URL));
      const items = rowsFromResult(await fetchJson(WORK_ITEMS_URL));
      const ordersWithItems = await Promise.all(orders.map(async order => {
        const orderId = getOrderId(order);
        return {
          order,
          items: await fetchWorkItemsForOrder(orderId, items)
        };
      }));
      buildTable(ordersWithItems);
    } catch(err) {
      table.innerHTML = `<thead><tr><th>Error: ${escapeHtml(err.message)}</th></tr></thead>`;
      console.error(err);
    }
  }

  async function fetchJson(url){
    const res = await fetch(url);
    const text = await res.text();
    let result;
    try { result = text ? JSON.parse(text) : []; }
    catch (_) { throw new Error(`${url}: endpoint returned non-JSON response`); }
    if (!res.ok || result.ok === false) throw new Error(`${url}: ${result.error || res.status}`);
    return result;
  }

  function rowsFromResult(result){
    if (Array.isArray(result)) return result;
    if (Array.isArray(result.rows)) return result.rows;
    if (Array.isArray(result.data)) return result.data;
    return [];
  }

  async function fetchWorkItemsForOrder(orderId, allItems){
    const fromAll = allItems.filter(item => String(getItemOrderId(item)) === String(orderId));
    if (fromAll.length) return fromAll;

    try {
      const filtered = rowsFromResult(await fetchJson(`${WORK_ITEMS_URL}?work_order_id=eq.${encodeURIComponent(orderId)}`));
      if (filtered.length) return filtered;
    } catch (err) {
      console.warn('Filtered work item fetch failed for work order', orderId, err);
    }

    return [];
  }

  function getObjectId(obj, explicitKeys){
    for (const key of explicitKeys) {
      if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
    }
    const dynamicKey = Object.keys(obj).find(key => {
      const normal = key.toLowerCase().replace(/[^a-z0-9]/g, '');
      return normal === 'workorderid' || normal === 'workordersid';
    });
    return dynamicKey ? obj[dynamicKey] : '';
  }
  function getOrderId(order){ return getObjectId(order, ['work_order_id','WorkOrderId','WorkOrderID','workOrderId','id','Id','ID']); }
  function getItemOrderId(item){ return getObjectId(item, ['work_order_id','WorkOrderId','WorkOrderID','workOrderId']); }
  function getVal(obj, keys, fallback=''){
    for (const key of keys) if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
    return fallback;
  }
  function num(value){ const n = Number(value); return Number.isFinite(n) ? n : 0; }
  function formatNumber(value){ const n = Number(value); return Number.isFinite(n) ? n.toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}) : '-'; }
  function formatDate(value){ if(!value) return '-'; const d = new Date(value); return isNaN(d.getTime()) ? escapeHtml(String(value)) : escapeHtml(d.toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'})); }

  function calcItem(item){
    const qty = num(getVal(item, ['quantity','Quantity','qty','Qty'], 0));
    const unit = num(getVal(item, ['unit_price','UnitPrice','unitPrice','price','Price'], 0));
    const storedTotal = getVal(item, ['line_total','LineTotal','lineTotal'], '');
    const lineTotal = storedTotal !== '' ? num(storedTotal) : qty * unit;
    const cost = num(getVal(item, ['estimated_cost','EstimatedCost','estimatedCost','cost','Cost'], 0));
    const storedGross = getVal(item, ['gross_profit','GrossProfit','grossProfit','anf','ANF'], '');
    const gross = storedGross !== '' ? num(storedGross) : lineTotal - cost;
    const storedMargin = getVal(item, ['gross_margin_pct','GrossMarginPct','grossMarginPct'], '');
    const margin = storedMargin !== '' ? num(storedMargin) : (lineTotal ? (gross / lineTotal) * 100 : 0);
    return { qty, unit, lineTotal, cost, gross, margin };
  }

  function buildTable(data){
    if (!data.length) { table.innerHTML = '<thead><tr><th>No work orders available</th></tr></thead>'; return; }
    const body = data.map(({order,items},idx)=>{
      const orderId = getOrderId(order) || '-';
      const total = getVal(order, ['total','Total'], '') || items.reduce((sum,item)=>sum+calcItem(item).lineTotal,0);
      const anf = getVal(order, ['anf','ANF','gross_profit','GrossProfit'], '') || items.reduce((sum,item)=>sum+calcItem(item).gross,0);
      const rows = items.map(item => {
        const c = calcItem(item);
        return `<tr>
          <td>${escapeHtml(getVal(item,['service_code','ServiceCode','service','Service'],'-'))}</td>
          <td>${escapeHtml(getVal(item,['product_code','ProductCode','product','Product'],'-'))}</td>
          <td>${escapeHtml(getVal(item,['region_code','RegionCode','region','Region'],'-'))}</td>
          <td class="num">${formatNumber(c.qty)}</td>
          <td class="num">${formatNumber(c.unit)}</td>
          <td class="num">${formatNumber(c.lineTotal)}</td>
          <td class="num">${formatNumber(c.cost)}</td>
          <td class="num">${formatNumber(c.gross)}</td>
          <td class="num">${formatNumber(c.margin)}%</td>
        </tr>`;
      }).join('') || '<tr><td colspan="9">No items found.</td></tr>';
      return `<tr class="wo-summary">
        <td><strong>${escapeHtml(orderId)}</strong><br><span class="muted-text">${escapeHtml(getVal(order,['status','Status'],'-'))}</span></td>
        <td>${escapeHtml(getVal(order,['account_id','AccountId','accountId'],'-'))}</td>
        <td>${escapeHtml(getVal(order,['contact_id','ContactId','contactId'],'-'))}</td>
        <td class="num">${formatNumber(total)}</td>
        <td class="num">${formatNumber(anf)}</td>
        <td>${formatDate(getVal(order,['created_at','CreateDateTime','CreatedDate','created'],'') )}</td>
        <td>${escapeHtml(getVal(order,['process','Process'],'-'))}</td>
        <td style="text-align:center"><button type="button" class="toggle-btn">▸</button></td>
      </tr>
      <tr class="wo-items-row" style="display:none">
        <td colspan="8" class="work-items-wrap">
          <table class="work-items-table">
            <thead><tr><th>Service</th><th>Product</th><th>Region</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Line Total</th><th class="num">Cost</th><th class="num">ANF</th><th class="num">Margin %</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </td>
      </tr>`;
    }).join('');
    table.innerHTML = `<thead><tr><th>Work Order</th><th>Account</th><th>Contact</th><th class="num">Total</th><th class="num">ANF</th><th>Created</th><th>Process</th><th>Items</th></tr></thead><tbody>${body}</tbody>`;
    table.querySelectorAll('.toggle-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const row = btn.closest('tr').nextElementSibling;
        const open = row.style.display !== 'none';
        row.style.display = open ? 'none' : '';
        btn.textContent = open ? '▸' : '▾';
      });
    });
  }

  function escapeHtml(value){ return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }

  loadData();
})();
</script>
</body>
</html>
