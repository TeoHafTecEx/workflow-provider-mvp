<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work Orders – TGC CRM</title>
<style>
/* Shared CRM styles */
:root{
  --page-bg:#f4f7fb;
}
*, *::before, *::after{ box-sizing:border-box; }
html,body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
}
body{
  background:var(--page-bg);
  font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
}
#crm-page[data-theme="dark"]{
  --main:#FFFFFF;
  --secondary:#0A1826;
  --accent:#D3A911;
  --panel:#0f2234;
  --border:#133147;
  --muted:#9fb3c8;
  --head:#0e1d2b;
  --btnText:#0A1826;
  --shadow:0 6px 20px rgba(0,0,0,.25);
}
#crm-page[data-theme="light"]{
  --main:#0A1826;
  --secondary:#FFFFFF;
  --accent:#D3A911;
  --panel:#ffffff;
  --border:#e6ecf3;
  --muted:#5b6b7a;
  --head:#f6f8fb;
  --btnText:#0A1826;
  --shadow:0 6px 18px rgba(10,24,38,.08);
}
#crm-page{
  background:var(--secondary);
  color:var(--main);
  width:100%;
  min-height:100vh;
  padding:20px 14px 40px;
}
.wrapper{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}
.brandbar{
  height:4px;
  background:linear-gradient(90deg,#fff 0,#fff 33%,#0A1826 33%,#0A1826 66%,#D3A911 66%);
  border-radius:4px;
  margin:0 auto 16px;
  width:100%;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.spacer{ flex:1; }
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
}
.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  border:1px solid var(--border);
  border-radius:12px;
}
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
thead th{
  background:var(--head);
  color:var(--main);
  font-weight:700;
  padding:12px 10px;
  border-bottom:1px solid var(--border);
  text-align:left;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
td{
  background:var(--panel);
  padding:10px 8px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* Numeric cells are right‑aligned with tabular figures for easy comparison. */
.num{
  text-align:right;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

/* Muted text for secondary information such as reference numbers. */
.muted-text{
  color:var(--muted);
  font-size:12px;
}
button, a.btn{
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  background:transparent;
  color:var(--accent);
  cursor:pointer;
  text-decoration:none;
  transition:background .15s ease, color .15s ease;
}
button:hover, a.btn:hover{
  background:var(--accent);
  color:var(--btnText);
}
</style>
</head>
<body>
<div id="crm-page" data-theme="light">
  <div class="wrapper">
    <div class="brandbar" aria-hidden="true"></div>
    <div class="row">
      <h1 style="margin:0;font-size:24px;">Work Orders</h1>
      <div class="spacer"></div>
      <a href="index.html" class="btn" style="margin-right:8px;">🏠 Home</a>
      <button id="themeToggle" class="btn" type="button">Light / Dark</button>
      <button id="refresh" class="btn" type="button">Refresh</button>
    </div>
    <div class="card" style="margin-top:16px;">
      <div class="table-wrap">
        <table id="dataTable"></table>
      </div>
    </div>
  </div>
</div>
<!-- Load global configuration for API endpoints -->
<script src="config.js"></script>
<script>
/**
 * Enhanced Work Orders page.
 * This script replaces the generic table rendering with a hierarchical view that
 * groups work items under their parent work order. Each work order row is
 * expandable; clicking the arrow button will reveal a nested table of items
 * along with calculated totals and gross profit (ANF) values.
 *
 * The design takes inspiration from the pricing page: numeric values are
 * right‑aligned via the `.num` class, and the table uses the same panel and
 * border colours defined by the theme. The existing theme toggle continues to
 * function as before.
 */
(function () {
  const root = document.getElementById("crm-page");
  const table = document.getElementById("dataTable");
  const refreshBtn = document.getElementById("refresh");

  // Define which properties correspond to commonly used fields. Work order and
  // work item records coming from the backend may use different column names;
  // these arrays provide a simple fallback mapping.
  const ORDER_FIELD_MAP = {
    id: ["WorkOrderId", "WorkOrderID", "Id", "ID"],
    accountId: ["AccountId", "AccountID"],
    contactId: ["ContactId", "ContactID"],
    entityRefNo: ["EntityRefNo", "RefNo", "OrderNumber"],
    created: ["CreateDateTime", "CreatedDate", "CreatedOn", "DateCreated"],
    updated: ["ModifiedDateTime", "UpdateDateTime", "ModifiedDate", "UpdatedOn"],
    currency: ["Currency"],
  };

  const ITEM_FIELD_MAP = {
    service: ["Service", "ServiceName", "ServiceCode"],
    product: ["Product", "ProductName", "ProductCode"],
    region: ["Region", "RegionName", "RegionCode"],
    quantity: ["Quantity", "Qty", "QtyOrdered"],
    unitPrice: ["UnitPrice", "PricePerUnit", "Price"],
    estimatedCost: ["EstimatedCost", "EstCost", "Cost"],
    notes: ["Notes", "Description", "Comments"],
  };

  // Toggle between light and dark modes.
  document.getElementById("themeToggle").onclick = () => {
    root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
  };

  refreshBtn.addEventListener("click", loadData);

  /**
   * Helper that returns the first non‑empty value from a set of possible keys.
   * @param {object} obj
   * @param {string[]} keys
   * @returns {any}
   */
  function getFirst(obj, keys) {
    for (const key of keys) {
      if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
        return obj[key];
      }
    }
    return undefined;
  }

  /**
   * Format a number as a locale‑aware string with two decimals.
   * When the value is not numeric, a dash is returned.
   * @param {number} n
   * @returns {string}
   */
  function formatNumber(n) {
    const num = Number(n);
    if (isNaN(num)) return "-";
    return num.toLocaleString("en-ZA", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
  }

  /**
   * Format a date string or date object into a short localised format.
   * @param {string|Date} value
   * @returns {string}
   */
  function formatDate(value) {
    if (!value) return "-";
    const d = new Date(value);
    if (isNaN(d.getTime())) return String(value);
    return d.toLocaleDateString("en-ZA", {
      day: "2-digit",
      month: "short",
      year: "numeric",
    });
  }

  /**
   * Main entry point: fetch work orders and their items, then build the table.
   */
  async function loadData() {
    table.innerHTML =
      "<thead><tr><th>Loading work orders...</th></tr></thead>";
    try {
      // Fetch all work orders. A page/size query is provided to limit the rows.
      const woRes = await fetch(
        `${window.APP_CONFIG.POSTGRES_API_BASE}/work-orders`
      );
      const woData = await woRes.json();
      const orders = Array.isArray(woData.rows) ? woData.rows : woData;

      // For each work order, fetch its items concurrently.
      const ordersWithItems = await Promise.all(
        orders.map(async (order) => {
          const orderId = getFirst(order, ORDER_FIELD_MAP.id);
          let items = [];
          try {
            if (orderId !== undefined) {
              const wiRes = await fetch(
                `${window.APP_CONFIG.POSTGRES_API_BASE}/work-items?workOrderId=${encodeURIComponent(
                  orderId
                )}`
              );
              const wiData = await wiRes.json();
              items = Array.isArray(wiData.rows) ? wiData.rows : wiData;
            }
          } catch (err) {
            console.error("Failed to fetch items for order", orderId, err);
          }
          return { order, items };
        })
      );

      buildTable(ordersWithItems);
    } catch (err) {
      console.error(err);
      table.innerHTML =
        "<thead><tr><th>Error loading work orders</th></tr></thead>";
    }
  }

  /**
   * Build and render the hierarchical table of work orders and items.
   * @param {{order:object, items:object[]}[]} data
   */
  function buildTable(data) {
    if (!Array.isArray(data) || data.length === 0) {
      table.innerHTML =
        "<thead><tr><th>No work orders available</th></tr></thead>";
      return;
    }

    // Assemble header row.
    const header = `
      <thead>
        <tr>
          <th>Work Order</th>
          <th>Account</th>
          <th>Contact</th>
          <th class="num">Total</th>
          <th class="num">ANF</th>
          <th>Created</th>
          <th>Updated</th>
          <th>Expand</th>
        </tr>
      </thead>
    `;

    // Generate rows.
    const bodyRows = data
      .map(({ order, items }, index) => {
        const id = getFirst(order, ORDER_FIELD_MAP.id) || "-";
        const accountId = getFirst(order, ORDER_FIELD_MAP.accountId) || "-";
        const contactId = getFirst(order, ORDER_FIELD_MAP.contactId) || "-";
        const entityRef = getFirst(order, ORDER_FIELD_MAP.entityRefNo) || "";
        const created = formatDate(getFirst(order, ORDER_FIELD_MAP.created));
        const updated = formatDate(getFirst(order, ORDER_FIELD_MAP.updated));
        const currency = getFirst(order, ORDER_FIELD_MAP.currency) || "";

        // Compute totals.
        let total = 0;
        let anf = 0;
        const itemRows = items.map((item) => {
          const qty = Number(getFirst(item, ITEM_FIELD_MAP.quantity)) || 0;
          const unitPrice =
            Number(getFirst(item, ITEM_FIELD_MAP.unitPrice)) || 0;
          const estCost =
            Number(getFirst(item, ITEM_FIELD_MAP.estimatedCost)) || 0;
          const lineTotal = qty * unitPrice;
          const gross = lineTotal - estCost;
          total += lineTotal;
          anf += gross;
          return `
            <tr>
              <td>${escapeHtml(
                getFirst(item, ITEM_FIELD_MAP.service) || "-"
              )}</td>
              <td>${escapeHtml(
                getFirst(item, ITEM_FIELD_MAP.product) || "-"
              )}</td>
              <td>${escapeHtml(
                getFirst(item, ITEM_FIELD_MAP.region) || "-"
              )}</td>
              <td class="num">${formatNumber(qty)}</td>
              <td class="num">${formatNumber(unitPrice)}</td>
              <td class="num">${formatNumber(lineTotal)}</td>
              <td class="num">${
                estCost ? formatNumber(estCost) : "-"
              }</td>
              <td class="num">${formatNumber(gross)}</td>
              <td class="num">${
                lineTotal
                  ? formatNumber((gross / lineTotal) * 100) + "%"
                  : "-"
              }</td>
            </tr>
          `;
        });

        // Summary row with toggle button. We include entityRef as muted text if present.
        const summaryCell = `
          <strong>${escapeHtml(String(id))}</strong>${
            entityRef ? `<br/><span class="muted-text">${escapeHtml(entityRef)}</span>` : ""
          }
        `;
        const totalCell = total ? formatNumber(total) : "-";
        const anfCell = anf ? formatNumber(anf) : "-";

        return `
          <tr class="wo-summary" data-index="${index}">
            <td>${summaryCell}</td>
            <td>${escapeHtml(String(accountId))}</td>
            <td>${escapeHtml(String(contactId))}</td>
            <td class="num">${totalCell}</td>
            <td class="num">${anfCell}</td>
            <td>${created}</td>
            <td>${updated}</td>
            <td style="text-align:center;">
              <button type="button" class="toggle-btn" aria-label="Expand row">▸</button>
            </td>
          </tr>
          <tr class="wo-items-row" style="display:none;">
            <td colspan="8" style="padding:0;border:0;">
              <table class="work-items-table" style="width:100%;border-collapse:collapse;">
                <thead>
                  <tr>
                    <th>Service</th>
                    <th>Product</th>
                    <th>Region</th>
                    <th class="num">Qty</th>
                    <th class="num">Unit Price</th>
                    <th class="num">Line Total</th>
                    <th class="num">Est Cost</th>
                    <th class="num">ANF</th>
                    <th class="num">Margin %</th>
                  </tr>
                </thead>
                <tbody>
                  ${itemRows.join("") || `<tr><td colspan="9">No items found.</td></tr>`}
                </tbody>
              </table>
            </td>
          </tr>
        `;
      })
      .join("");

    table.innerHTML = header + "<tbody>" + bodyRows + "</tbody>";

    // Attach event listeners for toggling item rows.
    table.querySelectorAll(".toggle-btn").forEach((btn, idx) => {
      btn.addEventListener("click", () => {
        const summaryRow = btn.closest(".wo-summary");
        const itemsRow = summaryRow.nextElementSibling;
        const isOpen = itemsRow.style.display !== "none";
        itemsRow.style.display = isOpen ? "none" : "";
        btn.textContent = isOpen ? "▸" : "▾";
      });
    });
  }

  // Escape HTML to prevent injection when displaying raw values.
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // Kick off the initial load.
  loadData();
})();
</script>
</body>
</html>
